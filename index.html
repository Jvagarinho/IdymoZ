<!DOCTYPE html>
<html lang="pt" style="overflow-x: visible">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IdymoZ - Seu Tutor de Inglês com IA</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --secondary: #f59e0b;
            --success: #10b981;
            --danger: #ef4444;
            --bg-main: #0f0f17;
            --bg-card: #1a1a2e;
            --bg-card-hover: #252542;
            --text-primary: #ffffff;
            --text-secondary: #a1a1aa;
            --text-muted: #71717a;
            --border: #2e2e4a;
            --glow: rgba(99, 102, 241, 0.5);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .theme-explorer {
            --level-color: #fbbf24;
            --bg-main: #fefce8;
            --bg-card: #fef9c3;
            --bg-card-hover: #fef08a;
            --text-primary: #1c1917;
            --text-secondary: #45423d;
            --text-muted: #78765c;
            --border: #eaddcf;
        }

        .theme-adventurer {
            --level-color: #22c55e;
            --bg-main: #f0fdf4;
            --bg-card: #dcfce7;
            --bg-card-hover: #bbf7d0;
            --text-primary: #14532d;
            --text-secondary: #166534;
            --text-muted: #3f7a47;
            --border: #bbf7d0;
        }

        .theme-master {
            --level-color: #4338ca;
            --bg-main: #eef2ff;
            --bg-card: #c7d2fe;
            --bg-card-hover: #a5b4fc;
            --text-primary: #1e1b4b;
            --text-secondary: #3730a3;
            --text-muted: #6366f1;
            --border: #a5b4fc;
        }

        .theme-expert {
            --level-color: #a855f7;
            --bg-main: #1e1b4b;
            --bg-card: #312e81;
            --bg-card-hover: #3730a3;
            --text-primary: #ffffff;
            --text-secondary: #c4b5fd;
            --text-muted: #a78bfa;
            --border: #4c1d95;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg-main);
            color: var(--text-primary);
            min-height: 100vh;
            transition: var(--transition);
            overflow-x: visible;
        }

        .app-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: visible;
        }

        header {
            text-align: center;
            padding: 50px 20px 40px;
            position: relative;
            overflow: visible !important;
            max-width: 100%;
        }

        .logo {
            font-family: 'Outfit', sans-serif;
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: 0;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 15px 30px 15px 15px;
            transition: var(--transition);
            color: var(--text-primary);
            margin-bottom: 10px;
        }

        .logo .z-glow {
            font-style: normal;
            font-weight: 800;
            text-shadow: 0 0 20px var(--level-color);
            color: var(--level-color);
        }

        @keyframes pulse-glow {
            0%, 100% { text-shadow: 0 0 15px var(--level-color); }
            50% { text-shadow: 0 0 35px var(--level-color); }
        }

        .tagline {
            color: var(--text-secondary);
            font-size: 0.95rem;
            margin-top: 8px;
            font-weight: 500;
        }

        .level-selector {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 6px;
            display: flex;
            gap: 6px;
            margin: 24px 0;
            border: 1px solid var(--border);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        }

        .level-btn {
            flex: 1;
            padding: 14px 12px;
            border: none;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            font-size: 0.8rem;
            border-radius: 12px;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .level-btn .level-icon {
            font-size: 1.4rem;
            font-weight: 700;
            font-family: 'Outfit', sans-serif;
            transition: var(--transition);
        }

        [data-level="explorer"] .level-icon { color: #fbbf24; }
        [data-level="adventurer"] .level-icon { color: #22c55e; }
        [data-level="master"] .level-icon { color: #4338ca; }
        [data-level="expert"] .level-icon { color: #a855f7; }

        .level-btn:hover {
            background: var(--bg-card-hover);
            color: var(--text-primary);
        }

        .level-btn.active {
            background: var(--level-color);
            color: #fff !important;
            box-shadow: 0 4px 15px var(--glow);
        }

        .level-btn.active .level-icon,
        .level-btn.active span:not(.level-icon) {
            color: #fff !important;
        }

        .level-btn.active .level-icon {
            transform: scale(1.1);
        }

        .level-description {
            text-align: center;
            color: var(--text-secondary);
            font-size: 0.85rem;
            margin-bottom: 20px;
            padding: 12px 16px;
            background: var(--bg-card);
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding-bottom: 180px;
        }

        .message {
            max-width: 85%;
            padding: 16px 20px;
            border-radius: 20px;
            font-size: 0.95rem;
            line-height: 1.6;
            animation: slide-up 0.3s ease-out;
        }

        @keyframes slide-up {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            align-self: flex-end;
            background: var(--primary);
            color: white;
            border-bottom-right-radius: 6px;
        }

        .message.ai {
            align-self: flex-start;
            background: var(--bg-card);
            color: var(--text-primary);
            border: 1px solid var(--border);
            border-bottom-left-radius: 6px;
        }

        .message .context-hint {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px dashed var(--border);
            font-style: italic;
        }

        .input-area {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, var(--bg-main) 0%, var(--bg-main) 70%, transparent 100%);
            padding: 30px 20px 20px;
        }

        .input-wrapper {
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            gap: 12px;
            background: var(--bg-card);
            border-radius: 24px;
            padding: 8px;
            border: 1px solid var(--border);
            box-shadow: 0 -4px 30px rgba(0, 0, 0, 0.2);
        }

        .input-field {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-size: 1rem;
            padding: 12px 16px;
            font-family: 'DM Sans', sans-serif;
            outline: none;
        }

        .input-field::placeholder {
            color: var(--text-muted);
        }

        .mic-btn, .send-btn {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
        }

        .mic-btn {
            background: var(--bg-card-hover);
            color: var(--text-primary);
        }

        .mic-btn:hover {
            background: var(--border);
            transform: scale(1.05);
        }

        .mic-btn.recording {
            background: var(--danger);
            color: white;
            animation: pulse-record 1s ease-in-out infinite;
        }

        @keyframes pulse-record {
            0%, 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); }
            50% { box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); }
        }

        .send-btn {
            background: var(--primary);
            color: white;
        }

        .send-btn:hover {
            background: var(--primary-dark);
            transform: scale(1.05);
        }

        .send-btn:disabled {
            background: var(--text-muted);
            cursor: not-allowed;
            transform: none;
        }

        .loading {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 16px 20px;
            color: var(--text-secondary);
        }

        .loading-dots {
            display: flex;
            gap: 4px;
        }

        .loading-dots span {
            width: 8px;
            height: 8px;
            background: var(--level-color);
            border-radius: 50%;
            animation: bounce 1.4s ease-in-out infinite;
        }

        .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
        .loading-dots span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        .empty-state {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px;
            color: var(--text-secondary);
        }

        .empty-state .icon {
            font-size: 4rem;
            margin-bottom: 20px;
            opacity: 0.6;
        }

        .empty-state h3 {
            font-family: 'Outfit', sans-serif;
            font-size: 1.5rem;
            margin-bottom: 12px;
            color: var(--text-primary);
        }

        .empty-state p {
            max-width: 300px;
            line-height: 1.6;
        }

        .controls-bar {
            display: flex;
            justify-content: center;
            gap: 24px;
            margin-top: 24px;
        }

        .control-btn {
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .control-btn:hover {
            background: var(--bg-card-hover);
            color: var(--text-primary);
        }

        @media (max-width: 600px) {
            .logo { font-size: 2rem; padding: 10px 15px; }
            .level-btn { padding: 10px 6px; font-size: 0.7rem; }
            .level-btn .level-icon { font-size: 1.2rem; }
            .message { font-size: 0.9rem; padding: 12px 16px; }
        }
    </style>
</head>
<body class="theme-explorer">
    <div class="app-container">
        <header>
            <div class="logo">
                Idymo<span class="z-glow">Z</span>
            </div>
            <p class="tagline">Seu tutor de inglês com inteligência artificial</p>
        </header>

        <div class="level-selector">
            <button class="level-btn active" data-level="explorer">
                <span class="level-icon">&#127758;</span>
                <span>Explorer</span>
            </button>
            <button class="level-btn" data-level="adventurer">
                <span class="level-icon">&#127793;</span>
                <span>Adventurer</span>
            </button>
            <button class="level-btn" data-level="master">
                <span class="level-icon">&#9876;</span>
                <span>Master</span>
            </button>
            <button class="level-btn" data-level="expert">
                <span class="level-icon">&#9818;</span>
                <span>Expert</span>
            </button>
        </div>

        <div class="level-description" id="levelDescription">
            <strong>Nivel Explorer (Iniciante A1/A2)</strong><br>
            Palavras simples, frases curtas, tom divertido e traducoes em portugues quando necessario.
        </div>

        <div class="chat-container" id="chatContainer">
            <div class="empty-state" id="emptyState">
                <div class="icon">*</div>
                <h3>Bem-vindo ao IdymoZ!</h3>
                <p>Selecione seu nivel e comece a praticar ingles. O reconhecimento de voz esta disponivel!</p>
            </div>
        </div>

        <div class="input-area">
            <div class="controls-bar">
                <button class="control-btn" id="clearChat">
                    Limpar Conversa
                </button>
                <button class="control-btn" id="speakLast">
                    Ouvir Ultima Resposta
                </button>
            </div>
            <br>
            <div class="input-wrapper">
                <input type="text" class="input-field" id="userInput" placeholder="Digite sua mensagem em português ou inglês...">
                <button class="mic-btn" id="micBtn" title="Clique para falar">🎤</button>
                <button class="send-btn" id="sendBtn" title="Enviar">➤</button>
            </div>
        </div>
    </div>

    <script>
        let API_KEY = localStorage.getItem('GROQ_API_KEY');
        if (!API_KEY) {
            API_KEY = prompt("Por favor, insira a sua Groq API Key:");
            if (API_KEY) localStorage.setItem('GROQ_API_KEY', API_KEY);
        }
        const API_URL = "https://api.groq.com/openai/v1/chat/completions";

        const LEVELS = {
            explorer: {
                name: "Explorer (A1/A2)",
                description: "<strong>Nivel Explorer (Iniciante A1/A2)</strong><br>Palavras simples, frases curtas, tom divertido e traducoes em portugues quando necessario.",
                prompt: `You are a friendly English tutor for beginners (A1/A2 level). 
- Use VERY simple vocabulary and short sentences (2-8 words).
- Speak in a playful, encouraging tone like a kind teacher.
- When introducing complex words, ALWAYS provide Portuguese translation in parentheses.
- Keep responses very short - max 2-3 sentences.
- Use simple present tense primarily.
- If user makes a mistake, gently correct with simple explanation.
- Always respond in English except when providing Portuguese translations.
- Do NOT use emojis in your responses.
- Ask simple follow-up questions to encourage practice.`,
                speed: 0.7,
                pitch: 1.2
            },
            adventurer: {
                name: "Adventurer (B1)",
                description: "<strong>Nivel Adventurer (Intermediario B1)</strong><br>Conversa diaria, phrasal verbs comuns e correcoes suaves.",
                prompt: `You are an English tutor for intermediate students (B1 level).
- Use everyday vocabulary and common phrasal verbs.
- Speak in a friendly, conversational tone.
- Keep responses moderate length - 3-5 sentences.
- Gently correct grammar mistakes with brief explanations.
- Introduce useful phrasal verbs naturally in context.
- Encourage conversation with interesting topics.
- Always respond in English.
- Do NOT use emojis in your responses.
- Make slight grammar corrections naturally within responses.`,
                speed: 0.85,
                pitch: 1.0
            },
            master: {
                name: "Master (B2)",
                description: "<strong>Nivel Master (Intermediario Alto B2)</strong><br>Temas complexos, idioms, vocabulario profissional e feedback estruturado.",
                prompt: `You are an advanced English tutor (B2 Upper-Intermediate level).
- Discuss complex topics with nuanced vocabulary.
- Include idioms and professional vocabulary naturally.
- At the end of EACH response, provide structured grammar/style feedback.
- Respond in 4-6 sentences with sophisticated sentence structures.
- Challenge the user with thought-provoking questions.
- Always respond entirely in English.
- Use synonyms and varied expressions.
- Do NOT use emojis in your responses.
- Feedback format: "Grammar Notes: [brief notes] - Vocabulary: [new words with meanings]"`,
                speed: 0.95,
                pitch: 0.95
            },
            expert: {
                name: "Expert (C1/C2)",
                description: "<strong>Nivel Expert (Avancado C1/C2)</strong><br>Debates filosoficos/tecnicos, sinonimos nuancedos, linguagem academica e desafios.",
                prompt: `You are an expert-level English tutor (C1/C2 Advanced).
- Engage in deep philosophical or technical debates.
- Use nuanced synonyms, academic language, and sophisticated expressions.
- Play Devil's Advocate - challenge the user's opinions intelligently.
- Respond in 5-8 sentences with complex structures.
- Use implicit corrections through natural advanced usage.
- Encourage critical thinking with provocative topics.
- Respond entirely in English with no translations.
- Push vocabulary boundaries with high-level words.
- Do NOT use emojis in your responses.
- End with open-ended deep questions to spark debate.`,
                speed: 1.0,
                pitch: 0.9
            }
        };

        let currentLevel = "explorer";
        let isRecording = false;
        let lastAiResponse = "";
        let recognition = null;

        const chatContainer = document.getElementById("chatContainer");
        const userInput = document.getElementById("userInput");
        const sendBtn = document.getElementById("sendBtn");
        const micBtn = document.getElementById("micBtn");
        const levelDescription = document.getElementById("levelDescription");
        const emptyState = document.getElementById("emptyState");
        const levelBtns = document.querySelectorAll(".level-btn");

        function updateTheme(level) {
            document.body.className = `theme-${level}`;
            levelDescription.innerHTML = LEVELS[level].description;
            levelBtns.forEach(btn => {
                btn.classList.toggle("active", btn.dataset.level === level);
            });
        }

        levelBtns.forEach(btn => {
            btn.addEventListener("click", () => {
                currentLevel = btn.dataset.level;
                updateTheme(currentLevel);
            });
        });

        if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition();
            recognition.lang = 'en-US';
            recognition.continuous = false;
            recognition.interimResults = false;

            recognition.onstart = () => {
                isRecording = true;
                micBtn.classList.add('recording');
                micBtn.textContent = '🛑';
            };

            recognition.onend = () => {
                isRecording = false;
                micBtn.classList.remove('recording');
                micBtn.textContent = '🎤';
            };

            recognition.onresult = (event) => {
                const transcript = event.results[0][0].transcript;
                userInput.value = transcript;
            };

            recognition.onerror = (event) => {
                console.error('Speech recognition error:', event.error);
                isRecording = false;
                micBtn.classList.remove('recording');
                micBtn.textContent = '🎤';
            };

            micBtn.addEventListener('click', () => {
                if (isRecording) {
                    recognition.stop();
                } else {
                    recognition.start();
                }
            });
        }

        function speakResponse(text, lang = 'en-US') {
            if (!window.speechSynthesis) return;
            
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = lang;
            utterance.rate = LEVELS[currentLevel].speed;
            utterance.pitch = LEVELS[currentLevel].pitch;
            
            const voices = window.speechSynthesis.getVoices();
            const englishVoice = voices.find(v => v.lang.startsWith('en') && v.name.includes('Google')) 
                || voices.find(v => v.lang.startsWith('en'))
                || voices[0];
            if (englishVoice) utterance.voice = englishVoice;
            
            window.speechSynthesis.speak(utterance);
        }

        function addMessage(content, isUser, context = null) {
            if (emptyState) emptyState.style.display = 'none';
            
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${isUser ? 'user' : 'ai'}`;
            
            let htmlContent = content.replace(/\n/g, '<br>');
            
            if (context && !isUser) {
                htmlContent += `<div class="context-hint">${context}</div>`;
            }
            
            msgDiv.innerHTML = htmlContent;
            chatContainer.appendChild(msgDiv);
            setTimeout(() => msgDiv.scrollIntoView({ behavior: 'smooth', block: 'end' }), 10);
        }

        function showLoading() {
            const loadingDiv = document.createElement('div');
            loadingDiv.className = 'loading';
            loadingDiv.id = 'loadingIndicator';
            loadingDiv.innerHTML = `
                <div class="loading-dots">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
                IdymoZ está pensando...
            `;
            chatContainer.appendChild(loadingDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function hideLoading() {
            const loading = document.getElementById('loadingIndicator');
            if (loading) loading.remove();
        }

        async function sendToGemini(userMessage) {
            showLoading();
            sendBtn.disabled = true;

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${API_KEY}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: 'llama-3.3-70b-versatile',
                        messages: [
                            { role: 'system', content: LEVELS[currentLevel].prompt },
                            { role: 'user', content: userMessage }
                        ],
                        temperature: 0.7,
                        max_tokens: 1024
                    })
                });

                const data = await response.json();
                
                hideLoading();
                
                if (data.choices && data.choices[0]) {
                    lastAiResponse = data.choices[0].message.content;
                    addMessage(lastAiResponse, false);
                    speakResponse(lastAiResponse);
                } else {
                    addMessage("Desculpe, ocorreu um erro. Tente novamente.", false);
                }
            } catch (error) {
                hideLoading();
                console.error('Error:', error);
                addMessage("Erro de conexão. Verifique sua internet.", false);
            }

            sendBtn.disabled = false;
        }

        function handleSend() {
            const message = userInput.value.trim();
            if (!message) return;
            
            addMessage(message, true);
            userInput.value = '';
            sendToGemini(message);
        }

        sendBtn.addEventListener('click', handleSend);
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleSend();
        });

        document.getElementById('clearChat').addEventListener('click', () => {
            chatContainer.innerHTML = '';
            chatContainer.appendChild(emptyState);
            emptyState.style.display = 'flex';
            lastAiResponse = '';
        });

        document.getElementById('speakLast').addEventListener('click', () => {
            if (lastAiResponse) {
                speakResponse(lastAiResponse);
            }
        });

        updateTheme(currentLevel);
    </script>
</body>
</html>
